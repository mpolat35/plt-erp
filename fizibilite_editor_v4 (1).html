<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fizibilite Etüdü Editörü — EK K-1</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<script src="https://unpkg.com/@phosphor-icons/web@2.1.1/src/index.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f5f6fa;--white:#ffffff;--surface2:#f0f1f7;--border:#e2e4ee;--border2:#d0d3e8;
  --accent:#2563eb;--accent-light:#eff6ff;--text:#1a1d2e;--text-dim:#4a5078;
  --text-muted:#9499b8;--green:#059669;--green-bg:#ecfdf5;--purple:#7c3aed;
  --purple-bg:#f5f3ff;--orange:#ea580c;--font:'Outfit',sans-serif;--shadow:0 1px 3px rgba(0,0,0,0.07)
}
body{font-family:var(--font);background:var(--bg);color:var(--text);height:100vh;display:flex;flex-direction:column;overflow:hidden}

/* ── TOPBAR ── */
.topbar{display:flex;align-items:center;gap:12px;padding:0 20px;height:52px;background:var(--white);border-bottom:1px solid var(--border);flex-shrink:0;box-shadow:var(--shadow);z-index:20}
.topbar-logo{width:30px;height:30px;background:linear-gradient(135deg,#2563eb,#7c3aed);border-radius:8px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.topbar-title{font-size:14px;font-weight:600}
.topbar-sub{font-size:11px;color:var(--text-muted)}
.topbar-spacer{flex:1}
.btn{font-family:var(--font);font-size:12.5px;font-weight:500;border-radius:7px;padding:6px 14px;cursor:pointer;border:1px solid transparent;transition:all .15s;display:inline-flex;align-items:center;gap:6px}
.btn-primary{background:var(--accent);color:#fff;border-color:var(--accent)}
.btn-primary:hover{background:#1d4ed8}
.btn-ghost{background:transparent;color:var(--text-dim);border-color:var(--border)}
.btn-ghost:hover{background:var(--surface2);color:var(--text)}
.btn-purple{background:var(--purple);color:#fff;border-color:var(--purple)}
.btn-purple:hover{background:#6d28d9}
.btn.saved{background:var(--green-bg);color:var(--green);border-color:#a7f3d0}
.btn-sm{padding:4px 10px;font-size:12px;border-radius:6px}
.btn-green{background:#059669;color:#fff;border-color:#059669}
.btn-green:hover{background:#047857}
.btn-orange{background:#ea580c;color:#fff;border-color:#ea580c}
.btn-orange:hover{background:#c2410c}
.topbar-actions{display:flex;gap:8px}
.topbar-divider{width:1px;background:var(--border);margin:10px 0;align-self:stretch}

/* ── LAYOUT ── */
.main{display:flex;flex:1;overflow:hidden}

/* ── SIDEBAR ── */
.sidebar{width:300px;min-width:200px;max-width:480px;display:flex;flex-direction:column;background:var(--white);border-right:1px solid var(--border);overflow:hidden;flex-shrink:0;position:relative}
.sidebar-header{padding:12px 14px 10px;border-bottom:1px solid var(--border);flex-shrink:0}
.sidebar-label{font-size:10px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--text-muted);margin-bottom:8px}
.search-wrap{position:relative;display:flex;align-items:center}
.search-icon{position:absolute;left:9px;color:var(--text-muted);pointer-events:none;display:flex;align-items:center}
.search-box{width:100%;font-family:var(--font);font-size:12.5px;background:var(--surface2);border:1px solid var(--border);border-radius:7px;color:var(--text);padding:6px 10px 6px 30px;outline:none;transition:border-color .15s}
.search-box:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(37,99,235,.1);background:#fff}
.search-box::placeholder{color:var(--text-muted)}
.tree-container{flex:1;overflow-y:auto;padding:6px 0 16px}
.tree-container::-webkit-scrollbar{width:4px}
.tree-container::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}

/* ── TREE ── */
.tree-item{display:flex;align-items:center;gap:4px;padding:4px 10px 4px 0;cursor:pointer;transition:background .1s;position:relative;min-height:30px}
.tree-item:hover{background:var(--surface2)}
.tree-item.active{background:var(--accent-light)}
.tree-item.active::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--accent);border-radius:0 2px 2px 0}
.tree-toggle{width:16px;height:20px;display:flex;align-items:center;justify-content:center;flex-shrink:0;color:var(--text-muted);font-size:9px;transition:transform .15s}
.tree-toggle.open{transform:rotate(90deg)}
.tree-toggle.leaf{opacity:0;pointer-events:none}
.item-icon{width:18px;flex-shrink:0;display:flex;align-items:center;color:var(--text-muted)}
.tree-item.active .item-icon{color:var(--accent)}
.tree-item[data-level="0"] .item-icon{color:var(--text-dim)}
.item-label{font-size:12px;font-weight:400;color:var(--text-dim);line-height:1.4;flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.tree-item.active .item-label{color:var(--accent);font-weight:500}
.tree-item[data-level="0"] .item-label{font-weight:600;color:var(--text);font-size:12.5px}
.has-dot::after{content:'';display:inline-block;width:5px;height:5px;border-radius:50%;background:var(--green);margin-left:5px;vertical-align:middle}
.tbl-badge{display:inline-flex;align-items:center;justify-content:center;width:14px;height:14px;border-radius:3px;background:#ede9fe;color:#7c3aed;font-size:8px;margin-left:3px;flex-shrink:0;font-weight:700}
.tree-children{overflow:hidden;transition:max-height .2s ease}
.tree-children.collapsed{max-height:0!important}
.tree-assignee{font-size:9px;padding:1px 5px;border-radius:3px;margin-left:2px;flex-shrink:0;max-width:52px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;background:#e0f2fe;color:#0369a1;font-weight:500}
.tree-assignee.has-date{background:#fef3c7;color:#92400e}

/* ── TREE EDIT CONTROLS ── */
.tree-actions{display:none;align-items:center;gap:1px;margin-left:auto;flex-shrink:0;padding-right:4px}
.tree-item:hover .tree-actions{display:flex}
.tree-item.active .tree-actions{display:flex}
.tree-act-btn{width:20px;height:20px;border-radius:4px;border:none;background:transparent;cursor:pointer;color:var(--text-muted);display:flex;align-items:center;justify-content:center;font-size:11px;transition:all .1s;padding:0;flex-shrink:0}
.tree-act-btn:hover{background:var(--white);color:var(--accent)}
.tree-act-btn.del:hover{background:#fee2e2;color:#dc2626}
.tree-act-btn.add-child:hover{background:var(--green-bg);color:var(--green)}

/* Inline rename input */
.tree-rename-input{font-family:var(--font);font-size:12px;border:1px solid var(--accent);border-radius:4px;padding:2px 6px;outline:none;flex:1;min-width:0;color:var(--text);background:#fff;box-shadow:0 0 0 2px rgba(37,99,235,.15)}

/* Add node dialog inside sidebar */
.tree-add-bar{display:flex;gap:6px;padding:8px 12px;background:var(--accent-light);border-top:1px solid var(--border);border-bottom:1px solid var(--border);flex-shrink:0;align-items:center}
.tree-add-bar input{font-family:var(--font);font-size:12.5px;border:1px solid var(--border);border-radius:6px;padding:5px 9px;flex:1;outline:none;color:var(--text)}
.tree-add-bar input:focus{border-color:var(--accent);box-shadow:0 0 0 2px rgba(37,99,235,.1)}
.tree-add-bar select{font-family:var(--font);font-size:12px;border:1px solid var(--border);border-radius:6px;padding:5px 8px;background:#fff;color:var(--text);outline:none;cursor:pointer}

/* Sidebar footer toolbar */
.sidebar-footer{padding:8px 12px;border-top:1px solid var(--border);flex-shrink:0;display:flex;gap:6px}
.sidebar-footer .btn{font-size:11.5px;padding:5px 10px;flex:1;justify-content:center}

/* ── RESIZE ── */
.resize-handle{position:absolute;right:-3px;top:0;bottom:0;width:7px;cursor:col-resize;z-index:10}
.resize-handle::after{content:'';position:absolute;left:3px;top:20%;bottom:20%;width:1px;background:var(--border)}
.resize-handle:hover::after,.resize-handle.dragging::after{background:var(--accent);width:2px}

/* ── EDITOR PANEL ── */
.editor-panel{flex:1;display:flex;flex-direction:column;overflow:hidden;background:var(--bg)}

/* ── EDITOR HEADER ── */
.editor-header{padding:14px 28px 0;background:var(--white);border-bottom:1px solid var(--border);flex-shrink:0;box-shadow:var(--shadow)}
.breadcrumb{display:flex;align-items:center;gap:5px;margin-bottom:4px;flex-wrap:wrap}
.bc-item{font-size:11px;color:var(--text-muted);font-weight:500}
.bc-sep{font-size:11px;color:var(--border2)}
.bc-item.current{color:var(--accent);font-weight:600}
.editor-title-row{display:flex;align-items:flex-start;gap:12px;margin-bottom:8px}
.editor-title{font-size:18px;font-weight:700;color:var(--text);letter-spacing:-.02em;line-height:1.3;flex:1}
.editor-hint{font-size:11.5px;color:var(--text-muted);line-height:1.5;margin-bottom:10px}

/* ── TASK META BAR (above tabs) ── */
.task-meta-bar{display:flex;gap:0;align-items:stretch;padding:10px 28px;background:var(--white);border-bottom:1px solid var(--border);flex-shrink:0;flex-wrap:wrap;gap:20px}
.meta-group{display:flex;align-items:center;gap:7px;flex:1;min-width:160px}
.meta-icon{color:var(--text-muted);display:flex;align-items:center;flex-shrink:0}
.meta-label{font-size:10.5px;font-weight:600;color:var(--text-muted);text-transform:uppercase;letter-spacing:.06em;white-space:nowrap;flex-shrink:0}
.meta-input{font-family:var(--font);font-size:13px;border:1px solid var(--border);border-radius:6px;padding:5px 9px;color:var(--text);background:var(--surface2);outline:none;transition:border-color .15s;flex:1;min-width:0}
.meta-input:focus{border-color:var(--accent);background:#fff;box-shadow:0 0 0 2px rgba(37,99,235,.1)}
.meta-input[type="date"]{font-size:12px}

/* ── TABS ── */
.tab-bar{display:flex;align-items:flex-end;gap:2px;padding:0 28px;background:var(--white);border-bottom:1px solid var(--border);flex-shrink:0}
.tab-btn{font-family:var(--font);font-size:12.5px;font-weight:500;padding:8px 14px 7px;cursor:pointer;background:transparent;border:none;border-bottom:2px solid transparent;color:var(--text-muted);transition:all .15s;display:flex;align-items:center;gap:5px;white-space:nowrap}
.tab-btn:hover{color:var(--text)}
.tab-btn.active{color:var(--accent);border-bottom-color:var(--accent);font-weight:600}

/* ── EDITOR BODY ── */
.editor-body{flex:1;overflow:hidden;display:flex;flex-direction:column}
.tab-panel{display:none;flex:1;overflow:auto;flex-direction:column}
.tab-panel.active{display:flex}

/* ── TEXT PANEL ── */
.text-panel-inner{flex:1;display:flex;flex-direction:column;padding:20px 32px;max-width:920px;width:100%;margin:0 auto}
.field-label{font-size:11px;font-weight:600;letter-spacing:.07em;text-transform:uppercase;color:var(--text-muted);margin-bottom:8px;margin-top:20px;display:flex;align-items:center;gap:6px}
.field-label:first-child{margin-top:0}

/* ── RICH TEXT EDITOR ── */
.rte-toolbar{display:flex;flex-wrap:wrap;gap:2px;padding:6px 8px;background:var(--surface2);border:1px solid var(--border);border-bottom:none;border-radius:8px 8px 0 0;align-items:center}
.rte-btn{font-family:var(--font);font-size:12.5px;font-weight:600;padding:4px 9px;border:1px solid transparent;border-radius:5px;background:var(--white);cursor:pointer;color:var(--text-dim);display:inline-flex;align-items:center;justify-content:center;transition:all .1s;min-width:32px;min-height:28px;line-height:1}
.rte-btn:hover{background:var(--white);border-color:var(--border2);color:var(--text);box-shadow:0 1px 3px rgba(0,0,0,.08)}
.rte-btn.active{background:var(--accent-light);border-color:var(--accent);color:var(--accent)}
.rte-sep{width:1px;background:var(--border2);margin:2px 4px;height:20px;align-self:center;flex-shrink:0}
.rte-select{font-family:var(--font);font-size:12px;border:1px solid var(--border);border-radius:5px;padding:4px 6px;background:var(--white);color:var(--text);outline:none;cursor:pointer;height:28px}
.rte-body{flex:1;min-height:280px;font-family:var(--font);font-size:14px;line-height:1.8;color:var(--text);background:var(--white);border:1px solid var(--border);border-radius:0 0 8px 8px;outline:none;padding:16px 18px;overflow:auto;word-break:break-word}
.rte-body:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(37,99,235,.1)}
.rte-body p{margin:0 0 6px}
.rte-body h1{font-size:1.5em;font-weight:700;margin:14px 0 6px;color:var(--text)}
.rte-body h2{font-size:1.25em;font-weight:700;margin:12px 0 5px;color:var(--text)}
.rte-body h3{font-size:1.1em;font-weight:600;margin:10px 0 4px;color:var(--text)}
.rte-body ul,.rte-body ol{padding-left:22px;margin:6px 0}
.rte-body li{margin:2px 0}
.rte-body blockquote{border-left:3px solid var(--accent);padding:8px 14px;background:var(--accent-light);margin:10px 0;border-radius:0 6px 6px 0;font-style:italic;color:var(--text-dim)}
.rte-body a{color:var(--accent);text-decoration:underline}
.rte-body:empty::before{content:attr(data-placeholder);color:var(--text-muted);pointer-events:none;white-space:pre-line}

/* ── FORM GRID ── */
.form-grid{display:grid;grid-template-columns:210px 1fr;border:1px solid var(--border);border-radius:8px;overflow:hidden;background:var(--white)}
.form-key{background:#f8f9fd;border-right:1px solid var(--border);border-bottom:1px solid var(--border);padding:10px 14px;font-size:12px;font-weight:500;color:var(--text-dim);display:flex;align-items:center}
.form-val{border-bottom:1px solid var(--border);padding:2px;background:var(--white)}
.form-row-last .form-key,.form-row-last .form-val{border-bottom:none}
.form-val input{width:100%;font-family:var(--font);font-size:13px;border:none;background:transparent;outline:none;padding:10px 12px;color:var(--text)}
.form-val input:focus{background:var(--accent-light)}

/* ── TABLES ── */
.table-panel-inner{flex:1;padding:24px 32px;overflow:auto}
.table-section{margin-bottom:36px}
.table-title{font-size:13px;font-weight:700;color:var(--text);margin-bottom:4px;padding-bottom:8px;border-bottom:2px solid var(--accent);display:inline-block}
.table-note{font-size:11px;color:var(--text-muted);margin-bottom:12px;font-style:italic}
.data-table{width:100%;border-collapse:collapse;font-size:12.5px;background:var(--white);border-radius:8px;overflow:hidden;box-shadow:var(--shadow);min-width:500px}
.data-table th{background:#eef2ff;color:var(--text);font-weight:600;font-size:11.5px;padding:10px 12px;text-align:left;border-bottom:2px solid var(--border2);border-right:1px solid var(--border);white-space:nowrap}
.data-table th:last-child{border-right:none}
.data-table td{padding:2px;border-bottom:1px solid var(--border);border-right:1px solid var(--border);vertical-align:top;min-width:90px}
.data-table td:last-child{border-right:none}
.data-table tr:last-child td{border-bottom:none}
.data-table td.row-header{background:#f8f9fd;font-weight:500;font-size:12px;color:var(--text-dim);padding:10px 12px;min-width:160px;max-width:210px;white-space:normal}
.data-table td.row-header.bold{font-weight:700;color:var(--text);background:#eef2ff}
.data-table tr.section-row td{background:#e8edff;font-weight:700;color:var(--text);padding:8px 12px;font-size:12px}
.data-table td input,.data-table td textarea{width:100%;font-family:var(--font);font-size:12.5px;border:none;background:transparent;outline:none;padding:9px 10px;color:var(--text);resize:none;min-height:38px;display:block}
.data-table td input:focus,.data-table td textarea:focus{background:var(--accent-light)}
.data-table td textarea{min-height:62px}
.tbl-scroll{overflow-x:auto}

/* ── STATUS ── */
.statusbar{padding:6px 28px;display:flex;align-items:center;gap:14px;border-top:1px solid var(--border);background:var(--white);flex-shrink:0}
.status-dot{width:6px;height:6px;border-radius:50%;background:var(--border2);transition:background .2s}
.status-dot.dirty{background:#f59e0b}
.status-dot.saved{background:var(--green)}
.status-item{font-size:11px;color:var(--text-muted)}

/* ── EMPTY ── */
.empty-state{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;opacity:.45}
.empty-text{font-size:15px;font-weight:600;color:var(--text-dim)}
.empty-sub{font-size:12px;color:var(--text-muted)}

/* ── DEFINITIONS PANEL ── */
.def-panel{flex:1;display:flex;flex-direction:column;padding:20px 32px;max-width:920px;width:100%;margin:0 auto}
.def-toolbar{display:flex;gap:8px;margin-bottom:14px}
.def-table-wrap{border:1px solid var(--border);border-radius:8px;overflow:hidden;background:var(--white)}
.def-table{width:100%;border-collapse:collapse}
.def-table th{background:#f0f1f7;font-size:11.5px;font-weight:600;color:var(--text-dim);padding:9px 14px;text-align:left;border-bottom:2px solid var(--border);border-right:1px solid var(--border)}
.def-table th:last-child{border-right:none;width:36px}
.def-table td{padding:2px;border-bottom:1px solid var(--border);border-right:1px solid var(--border);vertical-align:middle}
.def-table td:last-child{border-right:none}
.def-table tr:last-child td{border-bottom:none}
.def-table td input{width:100%;font-family:var(--font);font-size:13px;border:none;background:transparent;outline:none;padding:9px 12px;color:var(--text)}
.def-table td input:focus{background:var(--accent-light)}
.def-type-cell{padding:8px 12px!important;width:90px}
.def-type-badge{display:inline-flex;align-items:center;padding:2px 8px;border-radius:4px;font-size:10.5px;font-weight:600}
.def-type-badge.tanim{background:#e0f2fe;color:#0369a1}
.def-type-badge.kisaltma{background:#ede9fe;color:#6d28d9}
.def-del-btn{width:28px;height:28px;border-radius:5px;border:none;background:transparent;cursor:pointer;color:var(--text-muted);display:flex;align-items:center;justify-content:center;transition:all .12s;margin:auto}
.def-del-btn:hover{background:#fee2e2;color:#dc2626}
.def-empty{text-align:center;padding:40px;color:var(--text-muted);font-size:13px;line-height:2.2}

/* ── TOC PANEL ── */
.toc-panel{flex:1;display:flex;flex-direction:column;padding:20px 32px;max-width:920px;width:100%;margin:0 auto}
.toc-body{flex:1;font-family:var(--font);font-size:14px;line-height:1.8;color:var(--text);background:var(--white);border:1px solid var(--border);border-radius:8px;outline:none;padding:16px 18px;overflow:auto}
.toc-body:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(37,99,235,.1)}
.toc-body:empty::before{content:'İçindekiler listesini buraya yazabilirsiniz...';color:var(--text-muted)}

/* ── BULK ASSIGN MODAL ── */
.modal-overlay{position:fixed;inset:0;background:rgba(15,20,40,.45);z-index:1000;display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity .2s}
.modal-overlay.open{opacity:1;pointer-events:all}
.modal{background:var(--white);border-radius:14px;box-shadow:0 20px 60px rgba(0,0,0,.18);width:760px;max-width:94vw;max-height:88vh;display:flex;flex-direction:column;transform:translateY(12px);transition:transform .2s}
.modal-overlay.open .modal{transform:translateY(0)}
.modal-header{padding:18px 24px 14px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px}
.modal-title{font-size:16px;font-weight:700;color:var(--text);flex:1}
.modal-close{width:28px;height:28px;border-radius:6px;border:none;background:transparent;cursor:pointer;color:var(--text-muted);display:flex;align-items:center;justify-content:center;transition:all .1s}
.modal-close:hover{background:var(--surface2);color:var(--text)}
.modal-body{flex:1;overflow-y:auto;padding:16px 24px}
.modal-footer{padding:14px 24px;border-top:1px solid var(--border);display:flex;gap:8px;justify-content:flex-end}

/* Bulk assign table */
.ba-filters{display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap}
.ba-filter-btn{font-family:var(--font);font-size:12px;padding:5px 12px;border-radius:6px;border:1px solid var(--border);background:var(--surface2);color:var(--text-dim);cursor:pointer;transition:all .1s}
.ba-filter-btn.active{background:var(--accent-light);border-color:var(--accent);color:var(--accent);font-weight:600}
.ba-global{display:flex;gap:8px;padding:10px 12px;background:var(--surface2);border-radius:8px;margin-bottom:12px;align-items:center;flex-wrap:wrap}
.ba-global-label{font-size:12px;font-weight:600;color:var(--text-dim);white-space:nowrap}
.ba-global input[type="text"]{font-family:var(--font);font-size:12.5px;border:1px solid var(--border);border-radius:6px;padding:5px 9px;background:var(--white);outline:none;flex:1;min-width:120px;color:var(--text)}
.ba-global input[type="date"]{font-family:var(--font);font-size:12px;border:1px solid var(--border);border-radius:6px;padding:5px 9px;background:var(--white);outline:none;color:var(--text)}
.ba-table{width:100%;border-collapse:collapse;font-size:12.5px}
.ba-table th{background:#f0f1f7;font-size:11px;font-weight:600;color:var(--text-dim);padding:8px 10px;text-align:left;border-bottom:2px solid var(--border);border-right:1px solid var(--border);letter-spacing:.04em;text-transform:uppercase;white-space:nowrap}
.ba-table th:last-child{border-right:none}
.ba-table td{border-bottom:1px solid var(--border);border-right:1px solid var(--border);padding:3px 4px;vertical-align:middle}
.ba-table td:last-child{border-right:none}
.ba-table tr:last-child td{border-bottom:none}
.ba-table tr:hover td{background:var(--surface2)}
.ba-section-row td{background:#e8edff!important;font-weight:700;font-size:11.5px;color:var(--text);padding:7px 10px!important}
.ba-level-label{display:flex;align-items:center;gap:6px;padding:5px 8px;font-size:12.5px;color:var(--text-dim)}
.ba-level-label.l0{font-weight:700;color:var(--text)}
.ba-level-label.l1{padding-left:20px}
.ba-level-label.l2{padding-left:36px;color:var(--text-muted)}
.ba-table td input[type="text"]{width:100%;font-family:var(--font);font-size:12.5px;border:1px solid transparent;border-radius:5px;padding:5px 8px;background:transparent;outline:none;color:var(--text);transition:border-color .1s}
.ba-table td input[type="text"]:focus{border-color:var(--accent);background:#fff;box-shadow:0 0 0 2px rgba(37,99,235,.1)}
.ba-table td input[type="date"]{width:100%;font-family:var(--font);font-size:12px;border:1px solid transparent;border-radius:5px;padding:5px 6px;background:transparent;outline:none;color:var(--text);transition:border-color .1s}
.ba-table td input[type="date"]:focus{border-color:var(--accent);background:#fff}
.ba-table td input::placeholder{color:var(--text-muted)}
.ba-check{width:14px;height:14px;cursor:pointer;accent-color:var(--accent)}

/* ── CONTEXT MENU ── */
.ctx-menu{position:fixed;z-index:9999;background:var(--white);border:1px solid var(--border);border-radius:10px;box-shadow:0 8px 28px rgba(0,0,0,.14);padding:5px;min-width:195px;display:none}
.ctx-menu.visible{display:block}
.ctx-word{font-size:11px;color:var(--text-muted);padding:4px 12px 2px;font-style:italic;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:210px}
.ctx-sep{height:1px;background:var(--border);margin:4px 0}
.ctx-item{display:flex;align-items:center;gap:8px;padding:7px 12px;border-radius:6px;cursor:pointer;font-size:12.5px;font-weight:500;color:var(--text-dim);transition:background .1s}
.ctx-item:hover{background:var(--accent-light);color:var(--accent)}
.ctx-item.purple:hover{background:var(--purple-bg);color:var(--purple)}

/* ── TOAST ── */
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(14px);background:#1a1d2e;color:#fff;font-size:12.5px;font-weight:500;padding:9px 18px;border-radius:9px;box-shadow:0 4px 20px rgba(0,0,0,.18);opacity:0;transition:all .25s;pointer-events:none;z-index:99999;display:flex;align-items:center;gap:8px}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px}
</style>
</head>
<body>

<!-- Context Menu -->
<div class="ctx-menu" id="ctxMenu">
  <div class="ctx-word" id="ctxWord"></div>
  <div class="ctx-sep"></div>
  <div class="ctx-item" id="ctxAddDef"><span style="display:flex;align-items:center;color:#0369a1"><ph-icon name="book-open" weight="duotone"></ph-icon></span>Tanım Olarak Ekle</div>
  <div class="ctx-item purple" id="ctxAddKis"><span style="display:flex;align-items:center;color:#7c3aed"><ph-icon name="text-t" weight="duotone"></ph-icon></span>Kısaltma Olarak Ekle</div>
</div>

<!-- Toast -->
<div class="toast" id="toast"><span style="display:flex;align-items:center;color:#86efac"><ph-icon name="check-circle" weight="fill"></ph-icon></span><span id="toastMsg"></span></div>

<!-- Bulk Assign Modal -->
<div class="modal-overlay" id="baModal">
  <div class="modal">
    <div class="modal-header">
      <ph-icon name="users-three" weight="duotone" style="font-size:20px;color:var(--purple)"></ph-icon>
      <div class="modal-title">Toplu Görev Atama</div>
      <button class="modal-close" onclick="closeBaModal()">✕</button>
    </div>
    <div class="modal-body">
      <div class="ba-global">
        <span class="ba-global-label"><ph-icon name="magic-wand" weight="duotone" style="font-size:13px"></ph-icon> Seçilenlere toplu uygula:</span>
        <input type="text" id="baGlobalAssignee" placeholder="Görevli adı...">
        <input type="date" id="baGlobalStart">
        <input type="date" id="baGlobalDue">
        <button class="btn btn-sm btn-primary" onclick="applyGlobal()"><ph-icon name="arrows-clockwise" weight="bold"></ph-icon>Uygula</button>
      </div>
      <div class="ba-filters" id="baFilters">
        <button class="ba-filter-btn active" data-level="all" onclick="setBaFilter('all',this)">Tüm Görevler</button>
        <button class="ba-filter-btn" data-level="0" onclick="setBaFilter('0',this)">Ana Başlıklar</button>
        <button class="ba-filter-btn" data-level="1" onclick="setBaFilter('1',this)">Alt Başlıklar</button>
        <button class="ba-filter-btn" data-level="2" onclick="setBaFilter('2',this)">Alt-Alt Başlıklar</button>
        <button class="ba-filter-btn" data-level="unassigned" onclick="setBaFilter('unassigned',this)">Atanmamışlar</button>
      </div>
      <table class="ba-table" id="baTable">
        <thead><tr>
          <th style="width:30px"><input type="checkbox" class="ba-check" id="baSelectAll" onchange="toggleSelectAll(this)"></th>
          <th>Görev / Bölüm</th>
          <th style="width:160px">Görevli</th>
          <th style="width:120px">Başlangıç</th>
          <th style="width:120px">Bitiş</th>
        </tr></thead>
        <tbody id="baTbody"></tbody>
      </table>
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="closeBaModal()">Kapat</button>
      <button class="btn btn-primary" onclick="saveBaModal()"><ph-icon name="floppy-disk" weight="fill"></ph-icon>Kaydet</button>
    </div>
  </div>
</div>

<!-- Topbar -->
<div class="topbar">
  <div class="topbar-logo"><ph-icon name="file-text" weight="fill" style="color:#fff;font-size:16px"></ph-icon></div>
  <div><div class="topbar-title">Fizibilite Etüdü Editörü</div><div class="topbar-sub">EK K-1 Format</div></div>
  <div class="topbar-spacer"></div>
  <div class="topbar-actions">
    <button class="btn btn-ghost" onclick="expandAll()"><ph-icon name="arrows-out-simple" weight="bold"></ph-icon>Tümünü Aç</button>
    <div class="topbar-divider"></div>
    <button class="btn btn-ghost" onclick="exportWord()" title="Word belgesi olarak indir"><ph-icon name="microsoft-word-logo" weight="fill" style="color:#2563eb"></ph-icon>Word</button>
    <button class="btn btn-ghost" onclick="exportPDF()" title="PDF olarak indir"><ph-icon name="file-pdf" weight="fill" style="color:#dc2626"></ph-icon>PDF</button>
    <div class="topbar-divider"></div>
    <button class="btn btn-purple" onclick="openBaModal()"><ph-icon name="users-three" weight="duotone"></ph-icon>Görev Ata</button>
    <button class="btn btn-primary" id="saveBtn" onclick="saveAll()"><ph-icon name="floppy-disk" weight="fill"></ph-icon>Kaydet</button>
  </div>
</div>

<div class="main">
  <div class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <div class="sidebar-label">Belge Yapısı</div>
      <div class="search-wrap">
        <span class="search-icon"><ph-icon name="magnifying-glass" weight="bold" style="font-size:13px"></ph-icon></span>
        <input class="search-box" type="text" placeholder="Başlık ara..." oninput="filterTree(this.value)">
      </div>
    </div>
    <div class="tree-container" id="treeContainer"></div>
    <div class="sidebar-footer">
      <button class="btn btn-ghost" onclick="promptAddNode(null)" title="Ana başlık ekle">＋ Başlık Ekle</button>
      <button class="btn btn-ghost" onclick="expandAll()" title="Tümünü aç">↕ Aç</button>
    </div>
    <div class="resize-handle" id="resizeHandle"></div>
  </div>

  <div class="editor-panel">
    <div id="emptyState" class="empty-state">
      <ph-icon name="file-dashed" weight="duotone" style="font-size:52px;color:#9499b8"></ph-icon>
      <div class="empty-text">Bir başlık seçin</div>
      <div class="empty-sub">Sol panelden bir bölüm seçerek içerik ekleyebilirsiniz</div>
    </div>
    <div id="editorArea" style="display:none;flex-direction:column;flex:1;overflow:hidden;">
      <div class="editor-header">
        <div class="breadcrumb" id="breadcrumb"></div>
        <div class="editor-title-row">
          <div class="editor-title" id="editorTitle"></div>
        </div>
        <div class="editor-hint" id="editorHint"></div>
      </div>
      <!-- Task Meta Bar (always visible above tabs) -->
      <div class="task-meta-bar" id="taskMetaBar"></div>
      <div class="tab-bar" id="tabBar"></div>
      <div class="editor-body" id="editorBody"></div>
      <div class="statusbar">
        <div class="status-dot" id="statusDot"></div>
        <span class="status-item" id="statusText">Değişiklik yok</span>
        <div style="flex:1"></div>
        <span class="status-item" id="wordCount"></span>
      </div>
    </div>
  </div>
</div>

let contents={},activeId=null,isDirty=false,openNodes=new Set();
try{
  const s=localStorage.getItem('fiz5_c');if(s)contents=JSON.parse(s);
  const o=localStorage.getItem('fiz5_o');if(o)openNodes=new Set(JSON.parse(o));
  // Restore custom node structure (additions/deletions/renames)
  const ns=localStorage.getItem('fiz5_nodes');
  if(ns){
    const saved=JSON.parse(ns);
    // Merge: apply label changes and custom nodes onto NODES
    applyNodeChanges(NODES,saved);
  }
}catch(e){}
NODES.forEach(n=>openNodes.add(n.id));
if(!contents['__definitions'])contents['__definitions']=[];

// Merge saved node changes (labels + custom children) into live NODES
function applyNodeChanges(live,saved){
  saved.forEach(sn=>{
    const ln=live.find(n=>n.id===sn.id);
    if(ln){
      ln.label=sn.label; // restore renames
      if(sn.children&&ln.children)applyNodeChanges(ln.children,sn.children);
      // add custom children not in live
      if(sn.children)sn.children.forEach(sc=>{
        if(sc.isCustom&&!ln.children.find(lc=>lc.id===sc.id)){
          ln.children.push({...sc,children:sc.children||[]});
          applyNodeChanges(ln.children,[sc]);
        }
      });
    } else if(sn.isCustom){
      // top-level custom node
      live.push({...sn,children:sn.children||[]});
    }
  });
}

function serializeNodes(nodes){
  return nodes.map(n=>({
    id:n.id,label:n.label,icon:n.icon,level:n.level,hint:n.hint||'',
    isCustom:n.isCustom||false,
    children:n.children?serializeNodes(n.children):[]
  }));
}

function gc(id){return contents[id]||(contents[id]={})}

// ══════════════════════════════════════════════════════════════
//  TREE
// ══════════════════════════════════════════════════════════════
function buildTree(nodes,pPath=[]){
  const wrap=document.createElement('div');
  nodes.forEach(node=>{
    const hasC=node.children&&node.children.length>0;
    const isOpen=openNodes.has(node.id);
    const path=[...pPath,node];
    const outer=document.createElement('div');outer.className='tree-node';outer.dataset.id=node.id;
    const item=document.createElement('div');
    item.className='tree-item'+(node.id===activeId?' active':'');
    item.dataset.id=node.id;item.dataset.level=node.level;
    item.style.paddingLeft=(10+node.level*18)+'px';
    const c=gc(node.id);
    const tgl=document.createElement('span');
    tgl.className='tree-toggle'+(hasC?(isOpen?' open':''):' leaf');tgl.innerHTML='▶';
    if(hasC)tgl.onclick=e=>{e.stopPropagation();toggleNode(node.id);};
    const ico=document.createElement('span');ico.className='item-icon';
    const phEl=document.createElement('ph-icon');phEl.setAttribute('name',node.icon||'file');phEl.setAttribute('weight','duotone');phEl.style.fontSize='14px';ico.appendChild(phEl);
    const lbl=document.createElement('span');
    lbl.className='item-label'+(c.html&&c.html.trim()&&c.html!='<p></p>'?' has-dot':c.text&&c.text.trim()?' has-dot':'');
    lbl.textContent=node.label;
    // Double-click to rename
    lbl.ondblclick=e=>{e.stopPropagation();startRename(node,lbl,item);};

    item.appendChild(tgl);item.appendChild(ico);item.appendChild(lbl);

    // assignee badge
    const meta=c.meta||{};
    if(meta.assignee){
      const ab=document.createElement('span');ab.className='tree-assignee'+(meta.dueDate?' has-date':'');
      ab.title=meta.assignee+(meta.dueDate?' — Bitiş: '+meta.dueDate:'');
      ab.textContent=meta.assignee.split(' ')[0];item.appendChild(ab);
    }
    if(node.tables){const b=document.createElement('span');b.className='tbl-badge';b.textContent='T';item.appendChild(b);}
    if(node.isDefinitions){const b=document.createElement('span');b.className='tbl-badge';b.style.cssText='background:#e0f2fe;color:#0369a1';b.textContent='D';item.appendChild(b);}

    // ── Action buttons (hover) ──
    const acts=document.createElement('span');acts.className='tree-actions';
    // Add child
    const addBtn=document.createElement('button');addBtn.className='tree-act-btn add-child';addBtn.title='Alt başlık ekle';addBtn.textContent='＋';
    addBtn.onclick=e=>{e.stopPropagation();promptAddNode(node);};
    // Rename
    const renBtn=document.createElement('button');renBtn.className='tree-act-btn';renBtn.title='Yeniden adlandır';renBtn.textContent='✎';
    renBtn.onclick=e=>{e.stopPropagation();startRename(node,lbl,item);};
    // Delete
    const delBtn=document.createElement('button');delBtn.className='tree-act-btn del';delBtn.title='Sil';delBtn.textContent='✕';
    delBtn.onclick=e=>{e.stopPropagation();deleteNode(node.id);};
    acts.appendChild(addBtn);acts.appendChild(renBtn);acts.appendChild(delBtn);
    item.appendChild(acts);

    item.onclick=()=>selectNode(node.id,path);
    outer.appendChild(item);

    if(hasC){const ch=buildTree(node.children,path);ch.className='tree-children'+(isOpen?'':' collapsed');ch.id='ch_'+node.id;ch.style.maxHeight=isOpen?'9999px':'0';outer.appendChild(ch);}
    wrap.appendChild(outer);
  });return wrap;
}
function renderTree(){const c=document.getElementById('treeContainer');c.innerHTML='';c.appendChild(buildTree(NODES));}
function toggleNode(id){
  if(openNodes.has(id))openNodes.delete(id);else openNodes.add(id);
  localStorage.setItem('fiz5_o',JSON.stringify([...openNodes]));
  const el=document.getElementById('ch_'+id);const tgl=document.querySelector(`.tree-item[data-id="${id}"] .tree-toggle`);
  if(el){if(openNodes.has(id)){el.classList.remove('collapsed');el.style.maxHeight='9999px';tgl&&tgl.classList.add('open');}else{el.classList.add('collapsed');el.style.maxHeight='0';tgl&&tgl.classList.remove('open');}}
}
function expandAll(){function col(ns){ns.forEach(n=>{openNodes.add(n.id);if(n.children)col(n.children);})}col(NODES);renderTree();}
function filterTree(q){q=q.toLowerCase().trim();document.querySelectorAll('.tree-node').forEach(n=>{const l=n.querySelector('.item-label');if(!l)return;n.style.display=(!q||l.textContent.toLowerCase().includes(q))?'':'none';});}

// ── Find node by id in tree ──
function findNode(id,nodes=NODES){
  for(const n of nodes){if(n.id===id)return n;if(n.children){const f=findNode(id,n.children);if(f)return f;}}return null;
}

// ── Find parent array that contains a node id ──
function findParentArray(id,nodes=NODES){
  for(const n of nodes){
    if(n.children){
      if(n.children.some(c=>c.id===id))return n.children;
      const r=findParentArray(id,n.children);if(r)return r;
    }
  }
  return null;
}

// ── Generate unique id ──
function genId(){return'node_'+Date.now()+'_'+Math.random().toString(36).slice(2,6);}

// ── Inline rename ──
function startRename(node,labelEl,itemEl){
  const orig=node.label;
  const inp=document.createElement('input');inp.className='tree-rename-input';inp.value=orig;
  labelEl.replaceWith(inp);inp.focus();inp.select();
  const commit=()=>{
    const v=inp.value.trim()||orig;
    node.label=v;
    const newLbl=document.createElement('span');
    const c=gc(node.id);
    newLbl.className='item-label'+(c.html||c.text?' has-dot':'');
    newLbl.textContent=v;newLbl.ondblclick=e=>{e.stopPropagation();startRename(node,newLbl,itemEl);};
    inp.replaceWith(newLbl);
    if(activeId===node.id)document.getElementById('editorTitle').textContent=v;
    markDirty();saveAll();
    // update TOC
    updateToc();
  };
  inp.onblur=commit;
  inp.onkeydown=e=>{if(e.key==='Enter'){e.preventDefault();commit();}if(e.key==='Escape'){inp.value=orig;commit();}};
}

// ── Add new node ──
function promptAddNode(parentNode){
  const label=prompt(parentNode?`"${parentNode.label}" altına yeni başlık adı:` :'Yeni ana başlık adı:');
  if(!label||!label.trim())return;
  const newNode={
    id:genId(),
    label:label.trim(),
    level:parentNode?parentNode.level+1:0,
    icon:parentNode?'file':'folder-open',
    hint:'',
    children:[],
    isCustom:true
  };
  if(parentNode){
    parentNode.children=parentNode.children||[];
    parentNode.children.push(newNode);
    openNodes.add(parentNode.id);
  } else {
    NODES.push(newNode);
  }
  openNodes.add(newNode.id);
  markDirty();saveAll();renderTree();
  // auto-select new node
  const path=[];
  function findPath(id,nodes,acc){for(const n of nodes){const p=[...acc,n];if(n.id===id){path.push(...p);return true;}if(n.children&&findPath(id,n.children,p))return true;}return false;}
  findPath(newNode.id,NODES,[]);
  if(path.length)selectNode(newNode.id,path);
  updateToc();
}

// ── Delete node ──
function deleteNode(id){
  const node=findNode(id);if(!node)return;
  const name=node.label;
  const hasChildren=node.children&&node.children.length>0;
  const msg=hasChildren?`"${name}" ve tüm alt başlıkları silinecek. Emin misiniz?`:`"${name}" silinecek. Emin misiniz?`;
  if(!confirm(msg))return;
  // remove from tree
  const arr=findParentArray(id)||NODES;
  const idx=arr.findIndex(n=>n.id===id);
  if(idx!==-1)arr.splice(idx,1);
  // clear contents
  function clearContents(n){delete contents[n.id];if(n.children)n.children.forEach(clearContents);}
  clearContents(node);
  if(activeId===id){
    activeId=null;
    document.getElementById('editorArea').style.display='none';
    document.getElementById('emptyState').style.display='';
  }
  markDirty();saveAll();renderTree();updateToc();
}

// ── Auto-generate TOC from tree ──
function generateTocHtml(){
  let html='';
  const romanMap=[['',''],['I','II','III','IV','V','VI','VII','VIII','IX','X','XI','XII','XIII']];
  let l0counter=0;
  function walk(nodes,depth){
    nodes.forEach(node=>{
      if(node.isToc||node.isDefinitions)return;
      const indent=depth*20;
      if(depth===0){l0counter++;html+=`<p style="margin:8px 0 2px ${indent}px;font-weight:700;font-size:14px;color:#1a1d2e">${l0counter}. ${node.label}</p>`;}
      else if(depth===1){html+=`<p style="margin:2px 0 2px ${indent}px;font-size:13px;color:#4a5078">&nbsp;&nbsp;— ${node.label}</p>`;}
      else{html+=`<p style="margin:1px 0 1px ${indent}px;font-size:12px;color:#9499b8">&nbsp;&nbsp;&nbsp;&nbsp;• ${node.label}</p>`;}
      if(node.children&&node.children.length)walk(node.children,depth+1);
    });
  }
  walk(NODES,0);
  return html;
}

function updateToc(){
  // If user is looking at TOC right now, refresh it
  const tocBody=document.querySelector('.toc-auto-body');
  if(tocBody)tocBody.innerHTML=generateTocHtml();

// Tab icon map using Unicode symbols safe for innerHTML
const TAB_ICONS={
  'toc':'📋','definitions':'📖','text':'✏️','form':'☰','table':'⊞',
  'list-numbers':'📋','book-open':'📖','pencil-simple':'✏️','list-dashes':'☰','table2':'⊞'
};

function buildEditor(node){
  const tabBar=document.getElementById('tabBar'),body=document.getElementById('editorBody');
  tabBar.innerHTML='';body.innerHTML='';
  const tabs=[];
  if(node.isToc){tabs.push({id:'toc',emoji:'📋',label:'İçindekiler'});}
  else if(node.isDefinitions){tabs.push({id:'definitions',emoji:'📖',label:'Tanım ve Kısaltmalar'});}
  else{tabs.push({id:'text',emoji:'✏️',label:'Metin'});}
  if(node.formFields)tabs.push({id:'form',emoji:'☰',label:'Form Alanları'});
  if(node.tables)node.tables.forEach(tid=>{const t=TABLES[tid];if(t)tabs.push({id:'t_'+tid,emoji:'⊞',label:shortTblName(t.title)});});
  tabs.forEach((t,i)=>{
    const btn=document.createElement('button');btn.className='tab-btn'+(i===0?' active':'');btn.dataset.tab=t.id;
    btn.innerHTML=`<span style="font-size:13px">${t.emoji}</span>${t.label}`;
    btn.onclick=()=>switchTab(t.id);tabBar.appendChild(btn);
  });
  tabs.forEach((t,i)=>{
    const panel=document.createElement('div');panel.className='tab-panel'+(i===0?' active':'');panel.id='panel_'+t.id;
    if(t.id==='text')panel.appendChild(buildRtePanel(node));
    else if(t.id==='toc')panel.appendChild(buildTocPanel(node));
    else if(t.id==='definitions')panel.appendChild(buildDefinitionsPanel());
    else if(t.id==='form')panel.appendChild(buildFormPanel(node));
    else if(t.id.startsWith('t_'))panel.appendChild(buildTablePanel(t.id.slice(2),node));
    body.appendChild(panel);
  });
}
function shortTblName(title){const clean=title.replace(/\(TL\)/g,'').replace(/Tablo\s*\d+\.\s*/,'').trim();return clean.length>30?clean.slice(0,28)+'…':clean;}
function switchTab(tid){document.querySelectorAll('.tab-btn').forEach(b=>b.classList.toggle('active',b.dataset.tab===tid));document.querySelectorAll('.tab-panel').forEach(p=>p.classList.toggle('active',p.id==='panel_'+tid));}

];

function buildRtePanel(node){
  const outer=document.createElement('div');outer.className='text-panel-inner';
  const c=gc(node.id);

  // Toolbar
  const toolbar=document.createElement('div');toolbar.className='rte-toolbar';

  let rte; // forward ref for heading select

  RTE_TOOLS.forEach(b=>{
    if(b.sep){const s=document.createElement('span');s.className='rte-sep';toolbar.appendChild(s);return;}
    if(b.heading){
      const sel=document.createElement('select');sel.className='rte-select';sel.title='Başlık Stili';
      [['','Normal Metin'],['h1','Başlık 1'],['h2','Başlık 2'],['h3','Başlık 3']].forEach(([v,l])=>{
        const o=document.createElement('option');o.value=v;o.textContent=l;sel.appendChild(o);
      });
      sel.onmousedown=()=>{}; // keep focus on RTE
      sel.onchange=()=>{
        if(sel.value)document.execCommand('formatBlock',false,sel.value);
        else document.execCommand('formatBlock',false,'p');
        setTimeout(()=>rte&&rte.focus(),10);
      };
      toolbar.appendChild(sel);return;
    }
    const btn=document.createElement('button');btn.type='button';btn.className='rte-btn';btn.title=b.tip;
    btn.innerHTML=b.label;
    btn.onmousedown=e=>{
      e.preventDefault();
      if(b.cmd.startsWith('formatBlock_'))document.execCommand('formatBlock',false,b.cmd.split('_')[1]);
      else document.execCommand(b.cmd,false,null);
    };
    if(b.qcmd)btn.dataset.qcmd=b.qcmd;
    toolbar.appendChild(btn);
  });

  // Body
  rte=document.createElement('div');rte.className='rte-body';rte.contentEditable='true';
  rte.setAttribute('data-placeholder','Bu bölüme ait içeriği buraya yazın...');
  rte.innerHTML=c.html||'';
  rte.oninput=()=>{c.html=rte.innerHTML;markDirty();updateWC(rte.innerText);};
  rte.addEventListener('keydown',e=>{
    if(e.key==='Tab'){e.preventDefault();document.execCommand('insertText',false,'    ');}
  });
  rte.addEventListener('keyup',()=>syncToolbar(toolbar));
  rte.addEventListener('mouseup',()=>syncToolbar(toolbar));

  outer.appendChild(toolbar);outer.appendChild(rte);
  setTimeout(()=>updateWC(rte.innerText),0);
  return outer;
}

function syncToolbar(toolbar){
  toolbar.querySelectorAll('[data-qcmd]').forEach(btn=>{
    btn.classList.toggle('active',document.queryCommandState(btn.dataset.qcmd));
  });
}

function renderBaTable(){
  const tbody=document.getElementById('baTbody');tbody.innerHTML='';
  const check=document.getElementById('baSelectAll');if(check)check.checked=false;
  const flat=getAllNodesFLat();
  flat.forEach(n=>{
    const show=(
      baCurrentFilter==='all'||
      (baCurrentFilter==='0'&&n.level===0)||
      (baCurrentFilter==='1'&&n.level===1)||
      (baCurrentFilter==='2'&&n.level===2)||
      (baCurrentFilter==='unassigned'&&!baData[n.id]?.assignee)
    );
    if(!show)return;
    const tr=document.createElement('tr');
    const d=baData[n.id]||(baData[n.id]={assignee:'',startDate:'',dueDate:''});
    // checkbox
    const tdChk=document.createElement('td');tdChk.style.padding='4px 8px';
    const chk=document.createElement('input');chk.type='checkbox';chk.className='ba-check';chk.dataset.nid=n.id;

    // label

    lbl.innerHTML=`<span style="font-size:12px;opacity:.6">${n.level===0?'📁':n.level===1?'📄':'📌'}</span><span>${n.label}</span>`;
    tdLbl.appendChild(lbl);tr.appendChild(tdLbl);
    // assignee
    const tdA=document.createElement('td');const inpA=document.createElement('input');inpA.type='text';inpA.placeholder='Görevli...';inpA.value=d.assignee;
    inpA.oninput=()=>{d.assignee=inpA.value;};tdA.appendChild(inpA);tr.appendChild(tdA);
    // start
    const tdS=document.createElement('td');const inpS=document.createElement('input');inpS.type='date';inpS.value=d.startDate;
    inpS.oninput=()=>{d.startDate=inpS.value;};tdS.appendChild(inpS);tr.appendChild(tdS);
    // due
    const tdD=document.createElement('td');const inpD=document.createElement('input');inpD.type='date';inpD.value=d.dueDate;
    inpD.oninput=()=>{d.dueDate=inpD.value;};tdD.appendChild(inpD);tr.appendChild(tdD);
    tbody.appendChild(tr);
  });
}

function toggleSelectAll(master){
  document.querySelectorAll('#baTbody .ba-check').forEach(c=>c.checked=master.checked);
}

function applyGlobal(){
  const assignee=document.getElementById('baGlobalAssignee').value;
  const start=document.getElementById('baGlobalStart').value;
  const due=document.getElementById('baGlobalDue').value;
  const checked=[...document.querySelectorAll('#baTbody .ba-check:checked')].map(c=>c.dataset.nid);
  const targets=checked.length?checked:Object.keys(baData);
  targets.forEach(id=>{
    if(!baData[id])baData[id]={assignee:'',startDate:'',dueDate:''};
    if(assignee)baData[id].assignee=assignee;
    if(start)baData[id].startDate=start;
    if(due)baData[id].dueDate=due;
  });
  renderBaTable();showToast('Toplu uygulama yapıldı ('+(checked.length||targets.length)+' görev)');
}

// close modal on overlay click
document.getElementById('baModal').addEventListener('click',function(e){if(e.target===this)closeBaModal();});

// ══════════════════════════════════════════════════════════════
//  CONTEXT MENU
// ══════════════════════════════════════════════════════════════
let ctxSelection='';
const ctxMenu=document.getElementById('ctxMenu');
document.addEventListener('mouseup',e=>{
  setTimeout(()=>{
    const sel=window.getSelection();
    if(!sel||sel.isCollapsed){hideCtx();return;}
    const txt=sel.toString().trim();
    if(!txt||txt.length>100){hideCtx();return;}
    const anc=sel.anchorNode;
    const inEditor=document.getElementById('editorBody')?.contains(anc);
    if(!inEditor){hideCtx();return;}
    ctxSelection=txt;
    document.getElementById('ctxWord').textContent='"'+txt+'"';
    const mw=195,mh=90;
    ctxMenu.style.left=Math.min(e.clientX,window.innerWidth-mw-8)+'px';
    ctxMenu.style.top=Math.min(e.clientY,window.innerHeight-mh-8)+'px';
    ctxMenu.classList.add('visible');
  },5);
});
document.addEventListener('mousedown',e=>{if(!e.target.closest('#ctxMenu'))hideCtx();});
document.addEventListener('keydown',e=>{if(e.key==='Escape'){hideCtx();closeBaModal();}});
function hideCtx(){ctxMenu.classList.remove('visible');}
document.getElementById('ctxAddDef').onclick=()=>addFromSelection('tanim');
document.getElementById('ctxAddKis').onclick=()=>addFromSelection('kisaltma');
function addFromSelection(type){
  hideCtx();if(!ctxSelection)return;
  if(!contents['__definitions'])contents['__definitions']=[];
  contents['__definitions'].push({type,term:ctxSelection,desc:''});
  markDirty();saveAll();renderDefinitions();
  showToast((type==='tanim'?'Tanım':'Kısaltma')+' eklendi: "'+ctxSelection+'"');
  ctxSelection='';
}

// ══════════════════════════════════════════════════════════════
//  STATUS / SAVE
// ══════════════════════════════════════════════════════════════
function markDirty(){isDirty=true;setStatus('dirty');}
function setStatus(s){document.getElementById('statusDot').className='status-dot '+s;document.getElementById('statusText').textContent=s==='dirty'?'Kaydedilmemiş değişiklikler':'Kaydedildi';}
function updateWC(val){const w=val&&val.trim()?val.trim().split(/\s+/).length:0;document.getElementById('wordCount').textContent=w+' kelime';}
function saveCurrentContent(){if(!activeId)return;isDirty=false;const item=document.querySelector(`.tree-item[data-id="${activeId}"]`);const c=gc(activeId);const lbl=item&&item.querySelector('.item-label');if(lbl){const hasContent=(c.html&&c.html.trim()&&c.html!=='<p></p><br>')||( c.text&&c.text.trim());if(hasContent)lbl.classList.add('has-dot');else lbl.classList.remove('has-dot');}setStatus('saved');}
function saveAll(){
  saveCurrentContent();
  localStorage.setItem('fiz5_c',JSON.stringify(contents));
  localStorage.setItem('fiz5_nodes',JSON.stringify(serializeNodes(NODES)));
  const btn=document.getElementById('saveBtn');btn.classList.add('saved');
  btn.textContent='✓ Kaydedildi';
  renderTree();
  setTimeout(()=>{btn.classList.remove('saved');btn.textContent='💾 Kaydet';},2000);
}

// ══════════════════════════════════════════════════════════════
//  EXPORT — PDF
// ══════════════════════════════════════════════════════════════
function exportPDF(){
  showToast('PDF hazırlanıyor...');
  const {jsPDF}=window.jspdf;
  const doc=new jsPDF({orientation:'portrait',unit:'mm',format:'a4'});
  const margin=18;const pageW=210;const usableW=pageW-margin*2;
  let y=margin;const lineH=6;

  function addText(text,opts={}){
    const {size=11,bold=false,color=[30,30,50],maxW=usableW,indent=0}=opts;
    doc.setFontSize(size);doc.setFont('helvetica',bold?'bold':'normal');doc.setTextColor(...color);
    const lines=doc.splitTextToSize(text,maxW-indent);
    lines.forEach(line=>{
      if(y>280){doc.addPage();y=margin;}
      doc.text(line,margin+indent,y);y+=lineH;
    });
  }

  function addHr(color=[200,204,220]){
    if(y>278){doc.addPage();y=margin;}
    doc.setDrawColor(...color);doc.setLineWidth(.3);doc.line(margin,y,pageW-margin,y);y+=4;
  }

  // Title
  doc.setFillColor(37,99,235);doc.rect(0,0,210,28,'F');
  doc.setFontSize(16);doc.setFont('helvetica','bold');doc.setTextColor(255,255,255);
  doc.text('Fizibilite Etüdü — EK K-1',margin,18);y=36;

  function walkNodes(nodes,depth=0){
    nodes.forEach(node=>{
      const c=gc(node.id);
      const hasContent=c.html||c.text||c.form;
      if(!hasContent&&!(node.children&&node.children.length))return;

      if(y>275){doc.addPage();y=margin;}

      if(depth===0){
        y+=2;doc.setFillColor(238,242,255);doc.rect(margin,y-4,usableW,9,'F');
        addText(node.label,{size:13,bold:true,color:[37,99,235]});addHr([200,208,240]);
      } else if(depth===1){
        addText(node.label,{size:11,bold:true,color:[26,29,46],indent:2});y+=1;
      } else {
        addText(node.label,{size:10,bold:false,color:[74,80,120],indent:6});
      }

      // content
      if(c.html){
        const tmp=document.createElement('div');tmp.innerHTML=c.html;
        const txt=tmp.innerText||tmp.textContent;
        if(txt.trim())addText(txt.trim(),{size:10,color:[30,40,60],indent:depth*4+4,maxW:usableW-(depth*4+4)});
      } else if(c.text&&c.text.trim()){
        addText(c.text.trim(),{size:10,color:[30,40,60],indent:depth*4+4,maxW:usableW-(depth*4+4)});
      }
      if(c.form){
        Object.entries(c.form).forEach(([k,v])=>{if(v)addText(`${k}: ${v}`,{size:9,color:[60,70,100],indent:depth*4+6});});
      }
      if(c.meta&&c.meta.assignee){
        addText(`Görevli: ${c.meta.assignee}${c.meta.dueDate?' | Bitiş: '+c.meta.dueDate:''}`,{size:9,color:[5,150,105],indent:depth*4+6});
      }

      if(node.children&&node.children.length)walkNodes(node.children,depth+1);
      y+=1;
    });
  }

  walkNodes(NODES);

  // Definitions
  const defs=contents['__definitions']||[];
  if(defs.length){
    if(y>270){doc.addPage();y=margin;}
    y+=2;doc.setFillColor(238,242,255);doc.rect(margin,y-4,usableW,9,'F');
    addText('Tanım ve Kısaltmalar',{size:13,bold:true,color:[37,99,235]});addHr();
    defs.forEach(d=>{addText(`[${d.type==='tanim'?'Tanım':'Kısaltma'}] ${d.term}: ${d.desc||'—'}`,{size:10,color:[30,40,60],indent:4});});
  }

  // Footer
  const pages=doc.internal.getNumberOfPages();
  for(let i=1;i<=pages;i++){
    doc.setPage(i);doc.setFontSize(8);doc.setTextColor(150,155,180);
    doc.text('Fizibilite Etüdü EK K-1',margin,294);
    doc.text(`Sayfa ${i}/${pages}`,pageW-margin,294,'right');
  }

  doc.save('Fizibilite_Etudu_EK_K1.pdf');
  showToast('PDF indirildi!');
}

// ══════════════════════════════════════════════════════════════
//  EXPORT — WORD (.doc via HTML blob)
// ══════════════════════════════════════════════════════════════
function exportWord(){
  showToast('Word belgesi hazırlanıyor...');
  let html=`<!DOCTYPE html><html xmlns:o="urn:schemas-microsoft-com:office:office" xmlns:w="urn:schemas-microsoft-com:office:word" xmlns="http://www.w3.org/TR/REC-html40"><head><meta charset="utf-8"><title>Fizibilite Etüdü EK K-1</title><style>
    body{font-family:Calibri,sans-serif;font-size:11pt;color:#1a1d2e;margin:2cm}
    h1{font-size:16pt;color:#2563eb;margin:18pt 0 6pt;border-bottom:1pt solid #2563eb;padding-bottom:4pt}
    h2{font-size:13pt;color:#1a1d2e;margin:14pt 0 4pt}
    h3{font-size:11pt;color:#4a5078;margin:10pt 0 3pt}
    p{margin:4pt 0;line-height:1.5}
    .meta{font-size:9pt;color:#059669;margin-bottom:6pt}
    .field{font-size:10pt;margin:2pt 0 2pt 12pt;color:#374151}
    .field strong{color:#1a1d2e}
    .def-item{font-size:10pt;margin:3pt 0 3pt 12pt}
    table{border-collapse:collapse;width:100%;margin:8pt 0}
    th{background:#eef2ff;border:1pt solid #d0d3e8;padding:5pt 8pt;font-size:10pt;font-weight:bold;text-align:left}
    td{border:1pt solid #e2e4ee;padding:4pt 8pt;font-size:10pt}
    .section-row td{background:#e8edff;font-weight:bold}
    .cover{background:#2563eb;color:#fff;padding:14pt 16pt;margin-bottom:16pt}
    .cover h1{color:#fff;border-bottom:1pt solid rgba(255,255,255,.4)}
  </style></head><body>`;

  html+=`<div class="cover"><h1>Fizibilite Etüdü — EK K-1</h1><p style="color:rgba(255,255,255,.8);font-size:10pt">Hazırlanma Tarihi: ${new Date().toLocaleDateString('tr-TR')}</p></div>`;

  function walkNodes(nodes,depth=0){
    nodes.forEach(node=>{
      const c=gc(node.id);
      const tag=depth===0?'h1':depth===1?'h2':'h3';
      html+=`<${tag}>${node.label}</${tag}>`;

      if(c.meta&&c.meta.assignee){
        html+=`<p class="meta">👤 Görevli: <strong>${c.meta.assignee}</strong>`;
        if(c.meta.startDate)html+=` &nbsp;📅 Başlangıç: ${c.meta.startDate}`;
        if(c.meta.dueDate)html+=` &nbsp;📆 Bitiş: ${c.meta.dueDate}`;
        html+=`</p>`;
      }

      if(c.html&&c.html.trim()&&c.html!=='<p></p>'){html+=`<div style="margin:6pt 0 6pt ${depth*8}pt">${c.html}</div>`;}
      else if(c.text&&c.text.trim()){html+=`<p style="margin-left:${depth*8}pt">${c.text.replace(/\n/g,'<br>')}</p>`;}

      if(c.form){
        Object.entries(c.form).forEach(([k,v])=>{if(v)html+=`<p class="field"><strong>${k}:</strong> ${v}</p>`;});
      }

      if(node.children&&node.children.length)walkNodes(node.children,depth+1);
    });
  }
  walkNodes(NODES);

  // Definitions
  const defs=contents['__definitions']||[];
  if(defs.length){
    html+=`<h1>Tanım ve Kısaltmalar</h1><table><thead><tr><th>Tür</th><th>Terim / Kısaltma</th><th>Açıklama</th></tr></thead><tbody>`;
    defs.forEach(d=>{html+=`<tr><td>${d.type==='tanim'?'Tanım':'Kısaltma'}</td><td>${d.term||''}</td><td>${d.desc||''}</td></tr>`;});
    html+=`</tbody></table>`;
  }

  html+=`</body></html>`;

  const blob=new Blob(['\ufeff'+html],{type:'application/msword;charset=utf-8'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');a.href=url;a.download='Fizibilite_Etudu_EK_K1.doc';a.click();
  setTimeout(()=>URL.revokeObjectURL(url),2000);
  showToast('Word belgesi indirildi!');
}
function showToast(msg){const t=document.getElementById('toast');document.getElementById('toastMsg').textContent=msg;t.classList.add('show');if(toastTimer)clearTimeout(toastTimer);toastTimer=setTimeout(()=>t.classList.remove('show'),2800);}
